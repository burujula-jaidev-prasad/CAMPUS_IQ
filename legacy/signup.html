<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – CampusSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 460px;
      padding: 40px;
      border: 1px solid var(--border);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-header .logo-icon {
      width: 48px; height: 48px;
      background: var(--primary);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.5rem;
      margin: 0 auto 16px;
    }
    .auth-header h1 {
      font-size: 1.5rem;
      color: var(--dark);
      margin-bottom: 8px;
    }
    .auth-header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- NAV (Simple) -->
  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">🏢</div>
        CampusSpace
      </a>
      <a href="index.html" style="font-size: 0.9rem; font-weight: 500; color: var(--text-muted);">← Back to Home</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-icon">🏢</div>
        <h1>Create Account</h1>
        <p>Join 12+ institutions managing smarter spaces</p>
      </div>

      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="grid-2" style="margin-bottom: 20px;">
          <div class="form-group" style="margin-bottom: 0;">
            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="John" required>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Doe" required>
          </div>
        </div>
        <div class="form-group">
          <label for="institution">Institution Name</label>
          <input type="text" id="institution" placeholder="e.g. Christ University" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@institution.edu" required>
        </div>
        <div class="form-group">
          <label for="password">Create Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <p style="font-size: 0.75rem; margin-bottom: 24px; color: var(--text-muted);">
          By clicking sign up, you agree to our <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>.
        </p>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <footer style="background: transparent; border-top: none;">
    <div class="container" style="text-align: center; color: var(--text-muted); font-size: 0.8rem;">
      © 2026 CampusSpace. Secure Infrastructure Management.
    </div>
  </footer>

  <script>
    if (localStorage.getItem('userRole') === 'admin') {
      window.location.href = 'admin.html';
    }

    function handleSignup(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const fname = document.getElementById('fname').value;
      const institution = document.getElementById('institution').value;

      // Simple Persistence logic for demo
      let users = JSON.parse(localStorage.getItem('campusUsers') || '[]');
      
      // Check if user already exists
      if (users.some(u => u.email === email)) {
        alert('This email is already registered. Please log in.');
        window.location.href = 'login.html';
        return;
      }

      users.push({ 
        email, 
        password, 
        name: fname, 
        institution,
        role: 'student' // Default role for new signups
      });
      localStorage.setItem('campusUsers', JSON.stringify(users));

      alert('Account created successfully! You can now log in.');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
